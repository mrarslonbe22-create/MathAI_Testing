<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathAI – Mustaqil Ta'lim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BOSHLANG'ICH BO'LIM -->
<div class="container" id="start-section">
  <h1>MathAI – Mustaqil Ta'lim</h1>

  <input type="text" id="firstName" placeholder="Ismingiz"><br>
  <input type="text" id="lastName" placeholder="Familiyangiz"><br>

  <!-- Test boshlash tugmasi -->
  <button onclick="startTest()">Testni boshlash</button><br><br>

  <!-- Admin knopka -->
  <button onclick="openAdmin()">Admin</button>

  <!-- Admin parol input (dastlab yashirin) -->
  <div id="adminLogin" style="display:none; margin-top:10px;">
    <input type="password" id="adminPassword" placeholder="Admin parolni kiriting">
    <button onclick="checkAdmin()">Kirish</button>
  </div>
</div>

<!-- TEST SEKSYASI -->
<div class="container" id="test-section" style="display:none;">
  <h2 id="timer">⏱️ 150</h2>

  <div>
    <label>1. <span></span></label>
    <input type="number" id="q1"><br>

    <label>2. <span></span></label>
    <input type="number" id="q2"><br>

    <label>3. <span></span></label>
    <input type="number" id="q3"><br>

    <label>4. <span></span></label>
    <input type="number" id="q4"><br>

    <label>5. <span></span></label>
    <input type="number" id="q5"><br>
  </div>

  <button onclick="checkTest()">Tugallash</button>
</div>

<!-- NATIJA SEKSYASI -->
<div class="container result-card" id="result-section" style="display:none;">
  <h2 id="greeting"></h2>
  <p id="score"></p>
  <div id="recommendation"></div>
  <p id="nextTopicBtn"></p>
  <button onclick="askAI()">🤖 AI yordam</button>
  <button onclick="restartTest()">Qayta boshlash</button>
</div>

<!-- JS fayl sahifa oxirida -->
<script src="script.js" defer></script>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Natijalar</h1>

  <table>
    <thead>
      <tr>
        <th>Ism</th>
        <th>Ball</th>
        <th>Vaqt</th>
        <th>Noto‘g‘ri mavzular</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <br>
  <button onclick="clearData()">🗑 Tozalash</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("results")) || [];
let userData = JSON.parse(localStorage.getItem("userData")) || {};

let html = "";

data.forEach(d => {
  // Noto'g'ri mavzularni tekshirish
  let wrongTopics = userData[d.name] 
    ? Object.keys(userData[d.name])
        .filter(t => userData[d.name][t].wrong > 0)
        .join(", ") 
    : "-";

  html += `
    <tr>
      <td>${d.name}</td>
      <td>${d.score}/5</td>
      <td>${d.date}</td>
      <td>${wrongTopics}</td>
    </tr>
  `;
});

document.getElementById("tableBody").innerHTML = html;

// Tozalash funksiyasi
function clearData(){
  if(confirm("Haqiqatan ham barcha natijalarni o‘chirib tashlamoqchimisiz?")){
    localStorage.removeItem("results");
    localStorage.removeItem("userData");
    location.reload();
  }
}
</script>

</body>
</html>

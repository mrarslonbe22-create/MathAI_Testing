<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Natijalar</h1>

  <table>
    <thead>
      <tr>
        <th>Ism</th>
        <th>Ball</th>
        <th>Vaqt</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <br>
  <button onclick="clearData()">🗑 Tozalash</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("results")) || "";

let html = "";

data.forEach(d => {
  html += `
    <tr>
      <td>${d.name}</td>
      <td>${d.score}/5</td>
      <td>${d.date}</td>
    </tr>
  `;
});

document.getElementById("tableBody").innerHTML = html;

function clearData(){
  localStorage.removeItem("results");
  location.reload();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Natijalar</h1>
  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Ism</th>
        <th>Ball</th>
        <th>Vaqt</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let results = JSON.parse(localStorage.getItem("results")) || [];

let html = "";

results.forEach(r => {
  html += `<tr>
    <td>${r.name}</td>
    <td>${r.score}/5</td>
    <td>${r.date}</td>
  </tr>`;
});

document.getElementById("tableBody").innerHTML = html;
</script>

</body>
</html>

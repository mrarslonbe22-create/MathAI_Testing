<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Dars sahifasi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 id="title"></h1>
  <div id="content"></div>

  <h3>🤖 AI tushuntirish:</h3>
  <div id="aiContent">Yuklanmoqda...</div>

  <br>
  <button onclick="goBack()">⬅️ Orqaga</button>
</div>

<script>
const topic = localStorage.getItem("topic");

// Statik darslar
const lessons = {
  daraja: {
    title: "Daraja",
    content: `
      <h3>Formulalar:</h3>
      <p>aⁿ × aᵐ = aⁿ⁺ᵐ</p>
      <p>(aⁿ)ᵐ = aⁿᵐ</p>
      <p>a⁰ = 1</p>
      <p>a⁻ⁿ = 1/aⁿ</p>

      <h3>Nazariya:</h3>
      <p>Daraja — sonni o‘ziga ko‘paytirishdir.</p>
    `
  },

  ildiz: {
    title: "Ildiz",
    content: `
      <h3>Formulalar:</h3>
      <p>√a × √b = √ab</p>
      <p>√(a²) = a</p>

      <h3>Nazariya:</h3>
      <p>Ildiz — darajaning teskari amali.</p>
    `
  },

  trigonometriya: {
    title: "Trigonometriya",
    content: `
      <h3>Formulalar:</h3>
      <p>sin²x + cos²x = 1</p>
      <p>tan x = sin x / cos x</p>

      <h3>Nazariya:</h3>
      <p>Trigonometrik funksiyalar burchaklar bilan ishlaydi.</p>
    `
  }
};

if (!lessons[topic]) {
  document.getElementById("title").innerText = "Mavzu topilmadi";
} else {
  document.getElementById("title").innerText = lessons[topic].title;
  document.getElementById("content").innerHTML = lessons[topic].content;
}

// AI funksiya
async function askAI(question){
  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{
        "Authorization":"Bearer YOUR_API_KEY",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system", content:"Sen matematika o‘qituvchisisan. Oddiy va sodda tushuntir."},
          {role:"user", content: question}
        ]
      })
    });
    const data = await response.json();
    return data.choices[0].message.content;
  } catch {
    return "AI ishlamayapti (API key xato yoki yo‘q)";
  }
}

async function loadAI(){
  const aiDiv = document.getElementById("aiContent");

  if (!topic) {
    aiDiv.innerHTML = "Mavzu topilmadi";
    return;
  }

  aiDiv.innerHTML = "AI tushuntirmoqda...";

  const response = await askAI(`Matematika mavzusi: ${topic}. Oddiy qilib tushuntir va misol keltir.`);
  
  aiDiv.innerHTML = response;
}

loadAI();

function goBack(){ 
  window.location.href="index.html"; 
}
</script>

</body>
</html>
